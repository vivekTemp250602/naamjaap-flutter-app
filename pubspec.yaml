name: naamjaap
description: "Naam Jaap: Your personal sacred space for daily chanting."
publish_to: 'none'

version: 5.1.0+34

environment:
  sdk: '>=3.2.6 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations: 
    sdk: flutter
  intl: ^0.20.2

  # Core services - All updated to the latest major versions
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.1
  firebase_messaging: ^15.0.1
  firebase_crashlytics: ^4.1.0
  firebase_analytics: ^11.3.0
  firebase_remote_config: ^5.0.1
  share_plus: ^12.0.1
  google_fonts: ^6.3.2
  cloud_functions: ^5.0.0

  # Other services
  google_sign_in: ^6.2.1
  provider: ^6.1.2
  google_mobile_ads: ^5.1.0
  package_info_plus: ^8.0.0
  cached_network_image: ^3.3.0 

  # Utilities
  audioplayers: ^6.0.0
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  confetti: ^0.7.0
  path_provider: ^2.1.3
  flutter_animate: ^4.5.0
  firebase_in_app_messaging: ^0.8.0+1
  firebase_storage: ^12.1.0
  firebase_app_check: ^0.3.2+10
  introduction_screen: ^3.1.14
  showcaseview: ^3.0.0
  flutter_sound: ^9.27.0
  permission_handler: ^11.0.0
  lottie: ^3.0.0

  connectivity_plus: ^6.0.3
  
  cupertino_icons: ^1.0.6
  flutter_gen: ^5.12.0
  in_app_review: ^2.0.11
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/images/
    - assets/data/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_logo.png"
  min_sdk_android: 21

dependency_overrides:
  fluttertoast: ^9.0.0